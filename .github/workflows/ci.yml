name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

  storage-smoke:
    name: Storage smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install infra dependencies
        run: python -m pip install "psycopg[binary]>=3" "boto3>=1.34"

      - name: Run PostgreSQL and MinIO smoke
        run: PYTHON=python scripts/run_storage_smoke.sh
